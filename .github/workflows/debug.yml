name: Debug Build
run-name: Debug Build - ${{ github.ref_name }}

on:
  push:
    branches: ["n"]
  pull_request:
    branches: ["n"]
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DEBUG_DIR: app/build/outputs/apk/debug
      DEBUG_ASSET_DIR: app/build/outputs/apk/debug-assets

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon assembleDebug

      - name: Collect Debug APKs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${DEBUG_ASSET_DIR}"
          mkdir -p "${DEBUG_ASSET_DIR}"
          mapfile -t apks < <(find "${DEBUG_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "No debug APKs found in ${DEBUG_DIR}" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${DEBUG_ASSET_DIR}/"
          done

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.run_number }}
          path: ${{ env.DEBUG_ASSET_DIR }}/*
          if-no-files-found: error
