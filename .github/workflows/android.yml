name: Release Build
run-name: Release Build - ${{ github.event.release.tag_name || github.ref_name }}

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: "true"
      RELEASE_DIR: app/build/outputs/apk/release
      STAGING_DIR: app/build/outputs/apk/all
      ASSET_DIR: app/build/outputs/apk/release-assets
      RELEASE_TAG_RAW: ${{ github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Normalize Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG_RAW#v}"
          if [[ -z "${version}" ]]; then
            echo "Release tag is empty after normalization" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon assembleRelease -PappVersion="${{ steps.version.outputs.version }}"

      - name: Stage Unsigned APKs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "No release APKs found in ${RELEASE_DIR}" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done

      - name: Sign APKs
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: Prepare Release Assets
        id: prepare_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ASSET_DIR}"
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          copied=0
          for file in "${files[@]}"; do
            [[ -n "${file}" ]] || continue
            cp "${file}" "${ASSET_DIR}/"
            (
              cd "${ASSET_DIR}"
              sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256"
            )
            copied=$((copied + 1))
          done
          if [[ ${copied} -eq 0 ]]; then
            echo "No signed APKs were produced" >&2
            exit 1
          fi
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Upload Release Assets Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.version.outputs.version }}
          path: ${{ steps.prepare_assets.outputs.asset_dir }}/*
          if-no-files-found: error

      - name: Upload Assets to Source Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG_RAW }}
          files: |
            ${{ steps.prepare_assets.outputs.asset_dir }}/*
          tag_name: ${{ env.RELEASE_TAG_RAW }}
          draft: false
          append_body: true
          make_latest: true
          generate_release_notes: false
          body: |
            > [!Important]
            >
            > ## 模块的蓬勃生机离不开社区与群组,感谢各位的贡献

            > [!NOTE]
            > 项目仓库：https://github.com/${{ github.repository }}

            > ## 下载说明
            <b>- arm64-v8a:</b> 适用于64位ARM设备 (主流新手机)
            <b>- armeabi-v7a:</b> 适用于32位ARM设备 (旧款手机)
            <b>- x86 / x86_64:</b> 主要用于PC上的安卓模拟器
            <b>- universal:</b> 通用版 (不确定时使用，体积较大)
            >
            > **如果不确定，请下载 `universal` 版本。**

      - name: Sync Release to Target Repository
        uses: softprops/action-gh-release@v2
        with:
          repository: Xposed-Modules-Repo/io.github.aoguai.sesameag
          name: ${{ env.RELEASE_TAG_RAW }}
          files: |
            ${{ steps.prepare_assets.outputs.asset_dir }}/*
          token: ${{ secrets.TARGET_REPO_PAT }}
          tag_name: ${{ env.RELEASE_TAG_RAW }}
          draft: false
          make_latest: true
          body: |
            内容同步自源仓库 [Sesame-AG](https://github.com/${{ github.repository }})

            ${{ github.event.release.body }}

            > ## 下载说明
            <b>- arm64-v8a:</b> 适用于64位ARM设备 (主流新手机)
            <b>- armeabi-v7a:</b> 适用于32位ARM设备 (旧款手机)
            <b>- x86 / x86_64:</b> 主要用于PC上的安卓模拟器
            <b>- universal:</b> 通用版 (不确定时使用，体积较大)
            >
            > **如果不确定，请下载 `universal` 版本。**
